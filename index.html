<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .subTitle }}{{ .subTitle }}{{ else }}Subscription Dashboard{{ end }}</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Luminary Premium Theme CSS */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --base-deep: #0F1115; --base-mid: #161A20; --slate-light: #9CA3AF;
  --ivory: #E5E7EB; --silver: #B0B8C4;
  --panel-bg: rgba(22, 26, 32, 0.55);
  --panel-border: rgba(156, 163, 175, 0.08);
}
body { font-family: 'Montserrat', sans-serif; background: var(--base-deep); color: var(--ivory); overflow-x: hidden; }
.grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.03; mix-blend-mode: overlay; }
.atmosphere { position: fixed; inset: 0; z-index: 0; background: linear-gradient(180deg, #0F1115 0%, #161A20 100%); }
.container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 80px 20px; text-align: center; }

/* Hero */
.hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; margin-bottom: 20px; opacity: 0; transform: translateY(20px); transition: all 1s ease; }
.hero h1.visible { opacity: 1; transform: translateY(0); }
.hero-metrics { display: flex; justify-content: center; gap: 40px; margin: 50px 0; }
.metric { padding: 20px; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px; min-width: 140px; }
.metric-val { font-size: 1.5rem; font-weight: 600; }
.metric-label { font-size: 0.7rem; color: var(--slate-light); text-transform: uppercase; letter-spacing: 0.1em; }

/* Links Grid */
.links-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 50px; }
.link-item { background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
.link-item:hover { border-color: rgba(176,184,196,0.3); }
.link-url { font-family: monospace; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; max-width: 70%; white-space: nowrap; }
.btn { padding: 10px 20px; border-radius: 8px; border: none; background: var(--silver); color: var(--base-deep); font-weight: 600; cursor: pointer; font-size: 0.8rem; }

#toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 20px; border-radius: 50px; display: none; font-size: 0.8rem; }
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5"/><feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#n)"/>
</svg>
<div class="atmosphere"></div>

<div class="container">
  <div class="hero">
    <h1 id="title">Your Connection</h1>
    <p style="color: var(--slate-light);">ID: {{ .sId }}</p>
    
    <div class="hero-metrics">
        <div class="metric">
            <div class="metric-val">{{ .used }}</div>
            <div class="metric-label">Used</div>
        </div>
        <div class="metric">
            <div class="metric-val" style="color: var(--silver);">{{ .remained }}</div>
            <div class="metric-label">Remaining</div>
        </div>
    </div>
  </div>

  <div class="links-grid" id="nodes">
    {{ range .links }}
    <div class="link-item">
        <div class="link-url">{{ . }}</div>
        <button class="btn" onclick="copyText(this)">Copy</button>
    </div>
    {{ end }}
  </div>
</div>

<div id="toast">Copied to clipboard!</div>

<script>
  // Entrance animation
  setTimeout(() => document.getElementById('title').classList.add('visible'), 300);

  // Copy Logic
  function copyText(btn) {
    const text = btn.previousElementSibling.innerText;
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    });
  }

  // Smooth appearance of nodes
  const nodes = document.querySelectorAll('.link-item');
  const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
          if(e.isIntersecting) e.target.style.opacity = 1;
      });
  });
  nodes.forEach(n => {
      n.style.opacity = 0;
      n.style.transition = "opacity 1s ease";
      observer.observe(n);
  });
</script>
</body>
</html>
